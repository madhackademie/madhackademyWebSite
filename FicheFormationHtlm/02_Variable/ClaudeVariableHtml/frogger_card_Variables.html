<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger Card - Variables</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a3a2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 350px;
            height: 520px;
            background: linear-gradient(135deg, #1a4d2e 0%, #0f2818 100%);
            border-radius: 15px;
            border: 5px solid #8B4513;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8), 
                        inset 0 0 30px rgba(79, 157, 105, 0.2),
                        0 0 40px rgba(144, 238, 144, 0.3);
            position: relative;
            overflow: hidden;
        }

        .card-ornament {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(139, 69, 19, 0.4) 0%, transparent 100%);
            border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        }

        .card-title {
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 38px;
            font-weight: bold;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #90ee90 0%, #FFD700 50%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 20px rgba(144, 238, 144, 0.5);
            letter-spacing: 3px;
            z-index: 10;
        }

        .main-artwork {
            position: absolute;
            top: 80px;
            left: 25px;
            right: 25px;
            height: 380px;
            background: radial-gradient(circle at center, #2d5a3d 0%, #0a1f14 100%);
            border-radius: 12px;
            border: 3px solid #8B4513;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.6),
                        0 5px 20px rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-pattern {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            background-image: 
                linear-gradient(rgba(144, 238, 144, 0.5) 2px, transparent 2px),
                linear-gradient(90deg, rgba(144, 238, 144, 0.5) 2px, transparent 2px);
            background-size: 40px 40px;
        }

        .variable-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .frog-box {
            position: relative;
            width: 160px;
            height: 160px;
            background: linear-gradient(135deg, #4f9d69 0%, #2d5a3d 100%);
            border: 4px solid #FFD700;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6),
                        inset 0 0 20px rgba(255, 215, 0, 0.2),
                        0 0 30px rgba(255, 215, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 30px rgba(255, 215, 0, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 50px rgba(255, 215, 0, 0.5); }
        }

        .frog {
            font-size: 80px;
            filter: drop-shadow(0 5px 10px rgba(0, 0, 0, 0.5));
            animation: hop 2s ease-in-out infinite;
        }

        @keyframes hop {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .value-display {
            position: absolute;
            bottom: -15px;
            right: -15px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            border: 3px solid #8B4513;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #0f2818;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.6),
                        inset 0 0 10px rgba(255, 255, 255, 0.3);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .data-array {
            display: flex;
            gap: 15px;
            position: relative;
        }

        .array-cell {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #90ee90 0%, #4f9d69 100%);
            border: 3px solid #FFD700;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #0f2818;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4),
                        inset 0 0 15px rgba(255, 255, 255, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .array-cell:nth-child(1) { animation-delay: 0s; }
        .array-cell:nth-child(2) { animation-delay: 0.3s; }
        .array-cell:nth-child(3) { animation-delay: 0.6s; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent 0%, 
                rgba(255, 255, 255, 0.3) 50%, 
                transparent 100%);
            animation: shine 4s ease-in-out infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        .card-footer-ornament {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: linear-gradient(0deg, rgba(139, 69, 19, 0.4) 0%, transparent 100%);
            border-top: 2px solid rgba(255, 215, 0, 0.3);
        }

        .corner-decoration {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #FFD700;
        }

        .corner-decoration.top-left {
            top: 70px;
            left: 20px;
            border-right: none;
            border-bottom: none;
            border-radius: 8px 0 0 0;
        }

        .corner-decoration.top-right {
            top: 70px;
            right: 20px;
            border-left: none;
            border-bottom: none;
            border-radius: 0 8px 0 0;
        }

        .corner-decoration.bottom-left {
            bottom: 50px;
            left: 20px;
            border-right: none;
            border-top: none;
            border-radius: 0 0 0 8px;
        }

        .corner-decoration.bottom-right {
            bottom: 50px;
            right: 20px;
            border-left: none;
            border-top: none;
            border-radius: 0 0 8px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-ornament"></div>
        
        <div class="card-title">VARIABLES</div>
        
        <div class="corner-decoration top-left"></div>
        <div class="corner-decoration top-right"></div>
        <div class="corner-decoration bottom-left"></div>
        <div class="corner-decoration bottom-right"></div>
        
        <div class="main-artwork">
            <div class="grid-pattern"></div>
            <div class="shine"></div>
            
            <div class="variable-container">
                <div class="frog-box">
                    <div class="frog">🐸</div>
                    <div class="value-display">42</div>
                </div>
                
                <div class="data-array">
                    <div class="array-cell">X</div>
                    <div class="array-cell">Y</div>
                    <div class="array-cell">∞</div>
                </div>
            </div>
        </div>
        
        <div class="card-footer-ornament"></div>
    </div>
</body>
</html>
