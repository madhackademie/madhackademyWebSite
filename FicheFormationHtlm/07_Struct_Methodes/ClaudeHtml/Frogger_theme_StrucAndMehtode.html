<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frogger Card - Struct &amp; Methodes</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .card {
            width: 350px;
            height: 520px;
            background: linear-gradient(135deg, #1a4d2e 0%, #0f2818 100%);
            border-radius: 15px;
            border: 5px solid #8B4513;
            box-shadow: 0 15px 50px rgba(0,0,0,0.8),
                        inset 0 0 30px rgba(79,157,105,0.2),
                        0 0 40px rgba(144,238,144,0.3);
            position: relative;
            overflow: hidden;
        }

        .card-ornament {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(180deg, rgba(139,69,19,0.4) 0%, transparent 100%);
            border-bottom: 2px solid rgba(255,215,0,0.3);
        }

        .card-title {
            position: absolute;
            top: 12px; left: 0; right: 0;
            text-align: center;
            font-size: 22px;
            font-weight: bold;
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #90ee90 0%, #FFD700 50%, #FFFFFF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            line-height: 1.2;
            z-index: 10;
        }

        .main-artwork {
            position: absolute;
            top: 80px; left: 25px; right: 25px;
            height: 380px;
            background: radial-gradient(circle at center, #2d5a3d 0%, #0a1f14 100%);
            border-radius: 12px;
            border: 3px solid #8B4513;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.6), 0 5px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .watermark-duel {
            position: absolute;
            inset: 0;
            background: url('../../../docs/gamification/references/david-vs-goliath-duel-reference.png') center 58% / 100% auto no-repeat;
            opacity: 0.5;
            filter: saturate(0.65) brightness(0.75) contrast(1.05);
            pointer-events: none;
            z-index: 0;
        }

        .main-artwork svg {
            position: relative;
            z-index: 3;
        }

        .grid-pattern {
            position: absolute;
            width: 100%; height: 100%;
            opacity: 0.12;
            z-index: 1;
            background-image:
                linear-gradient(rgba(144,238,144,0.5) 2px, transparent 2px),
                linear-gradient(90deg, rgba(144,238,144,0.5) 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .shine {
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
            animation: shine 5s ease-in-out infinite;
            z-index: 2;
        }
        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 200%; }
        }

        .node-root { animation: pulseGold 3s ease-in-out infinite; }
        @keyframes pulseGold {
            0%, 100% { filter: drop-shadow(0 0 8px rgba(255,215,0,0.5)); }
            50%       { filter: drop-shadow(0 0 20px rgba(255,215,0,1)); }
        }

        .node-branch { animation: pulseGreen 3s ease-in-out infinite; }
        @keyframes pulseGreen {
            0%, 100% { filter: drop-shadow(0 0 5px rgba(144,238,144,0.3)); }
            50%       { filter: drop-shadow(0 0 14px rgba(144,238,144,0.8)); }
        }

        .node-leaf { animation: pulseLeaf 3s ease-in-out infinite; }
        @keyframes pulseLeaf {
            0%, 100% { filter: drop-shadow(0 0 3px rgba(139,69,19,0.3)); }
            50%       { filter: drop-shadow(0 0 9px rgba(255,215,0,0.5)); }
        }

        .zone-frame {
            fill: rgba(45, 90, 61, 0.12);
            stroke-width: 2;
            stroke-opacity: 0.55;
            stroke-dasharray: 7, 5;
        }
        .zone-frame.variables { stroke: #90ee90; }
        .zone-frame.methods   { stroke: #FFD700; }

        .corner-decoration {
            position: absolute;
            width: 28px; height: 28px;
            border: 3px solid #FFD700;
        }
        .corner-decoration.top-left    { top:70px;  left:20px;  border-right:none; border-bottom:none; border-radius:8px 0 0 0; }
        .corner-decoration.top-right   { top:70px;  right:20px; border-left:none;  border-bottom:none; border-radius:0 8px 0 0; }
        .corner-decoration.bottom-left  { bottom:0;  left:20px;  border-right:none; border-top:none;    border-radius:0 0 0 8px; }
        .corner-decoration.bottom-right { bottom:0;  right:20px; border-left:none;  border-top:none;    border-radius:0 0 8px 0; }

        .card-footer-ornament {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 50px;
            background: linear-gradient(0deg, rgba(139,69,19,0.4) 0%, transparent 100%);
            border-top: 2px solid rgba(255,215,0,0.3);
        }
    </style>
</head>
<body>
<div class="card">
    <div class="card-ornament"></div>
    <div class="card-title">Struct &amp; Methodes</div>

    <div class="corner-decoration top-left"></div>
    <div class="corner-decoration top-right"></div>
    <div class="corner-decoration bottom-left"></div>
    <div class="corner-decoration bottom-right"></div>

    <div class="main-artwork">
        <div class="watermark-duel" aria-hidden="true"></div>
        <div class="grid-pattern"></div>
        <div class="shine"></div>

        <svg viewBox="0 0 300 370" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">

            <!-- Cadres englobants Variables & Méthodes -->
            <rect class="zone-frame variables" x="2" y="96" width="146" height="226" rx="12"/>
            <rect class="zone-frame methods"   x="150" y="96" width="148" height="226" rx="12"/>

            <!-- Root → 2 branches -->
            <line x1="150" y1="55"  x2="80"  y2="115" stroke="#FFD700" stroke-width="2.5" stroke-opacity="0.7"/>
            <line x1="150" y1="55"  x2="220" y2="115" stroke="#FFD700" stroke-width="2.5" stroke-opacity="0.7"/>

            <!-- Left branch → leaves (2 champs) -->
            <line x1="80"  y1="140" x2="42"  y2="208" stroke="#90ee90" stroke-width="1.8" stroke-opacity="0.6"/>
            <line x1="80"  y1="140" x2="118" y2="208" stroke="#90ee90" stroke-width="1.8" stroke-opacity="0.6"/>

            <!-- Right branch → leaves (2 méthodes) -->
            <line x1="220" y1="140" x2="182" y2="208" stroke="#90ee90" stroke-width="1.8" stroke-opacity="0.6"/>
            <line x1="220" y1="140" x2="258" y2="208" stroke="#90ee90" stroke-width="1.8" stroke-opacity="0.6"/>

            <!-- leaf → sub-leaf -->
            <line x1="80"  y1="236" x2="80"  y2="286" stroke="#8B4513" stroke-width="1.2" stroke-opacity="0.7"/>
            <line x1="220" y1="236" x2="220" y2="286" stroke="#8B4513" stroke-width="1.2" stroke-opacity="0.7"/>

            <!-- ===== ROOT : struct ===== -->
            <g class="node-root" transform="translate(150,32)">
                <rect x="-58" y="-22" width="116" height="46" rx="11" fill="#4f9d69" stroke="#FFD700" stroke-width="3.5"/>
                <text y="-4" text-anchor="middle" font-family="monospace" font-size="13" font-weight="bold" fill="#FFD700">struct</text>
                <text y="13" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFFFFF">Fighter { … }</text>
            </g>

            <!-- ===== BRANCH 1 : Variables & Types ===== -->
            <g class="node-branch" transform="translate(80,127)">
                <rect x="-56" y="-20" width="112" height="38" rx="9" fill="#2d5a3d" stroke="#90ee90" stroke-width="2.5"/>
                <text y="-4" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#90ee90">1. Variables</text>
                <text y="11" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700">&amp; Types</text>
            </g>

            <!-- ===== BRANCH 2 : Fonctions ===== -->
            <g class="node-branch" transform="translate(220,127)">
                <rect x="-56" y="-20" width="112" height="38" rx="9" fill="#2d5a3d" stroke="#90ee90" stroke-width="2.5"/>
                <text y="-4" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#90ee90">2. Fonctions</text>
                <text y="11" text-anchor="middle" font-family="monospace" font-size="9" fill="#FFD700">(méthodes)</text>
            </g>

            <!-- ===== LEAVES – Variables (2 champs) ===== -->
            <g class="node-leaf" transform="translate(42,222)">
                <rect x="-30" y="-14" width="60" height="26" rx="6" fill="#1a3a28" stroke="#8B4513" stroke-width="2"/>
                <text y="-1" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFD700">int</text>
                <text y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#90ee90">hp</text>
            </g>
            <g class="node-leaf" transform="translate(118,222)">
                <rect x="-30" y="-14" width="60" height="26" rx="6" fill="#1a3a28" stroke="#8B4513" stroke-width="2"/>
                <text y="-1" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFD700">string</text>
                <text y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#90ee90">name</text>
            </g>

            <!-- ===== LEAVES – Fonctions (2 méthodes) ===== -->
            <g class="node-leaf" transform="translate(182,222)">
                <rect x="-32" y="-14" width="64" height="26" rx="6" fill="#1a3a28" stroke="#8B4513" stroke-width="2"/>
                <text y="-1" text-anchor="middle" font-family="monospace" font-size="8" fill="#FFD700">Attack()</text>
                <text y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#90ee90">&amp;</text>
            </g>
            <g class="node-leaf" transform="translate(258,222)">
                <rect x="-36" y="-14" width="72" height="26" rx="6" fill="#1a3a28" stroke="#8B4513" stroke-width="2"/>
                <text y="-1" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFD700">PrintStatus()</text>
                <text y="10" text-anchor="middle" font-family="monospace" font-size="7" fill="#90ee90">const</text>
            </g>

            <!-- ===== SUB-LEAVES ===== -->
            <g transform="translate(80,300)">
                <rect x="-34" y="-14" width="68" height="28" rx="5" fill="#0f2818" stroke="#FFD700" stroke-width="1.5"/>
                <text x="0" y="0" text-anchor="middle" font-family="monospace" font-size="7" fill="#FFD700">
                    <tspan x="0" dy="-0.55em">hp = 30</tspan>
                </text>
                <text x="-15" y="3.15" text-anchor="start" font-family="monospace" font-size="7" fill="#90ee90">atk = 8</text>
            </g>
            <g transform="translate(220,300)">
                <rect x="-42" y="-12" width="84" height="24" rx="5" fill="#0f2818" stroke="#FFD700" stroke-width="1.5"/>
                <text x="0" y="0" text-anchor="middle" dominant-baseline="middle" font-family="monospace" font-size="7" fill="#90ee90">Attack(goliath)</text>
            </g>

            <!-- ===== BOTTOM BANNER ===== -->
            <rect x="10" y="336" width="280" height="32" rx="8" fill="#2d5a3d" stroke="#FFD700" stroke-width="2"/>
            <text x="150" y="349" text-anchor="middle" font-family="Georgia" font-size="9" fill="#FFD700">Struct &amp; Methodes · C++ · Raylib 🐸</text>
            <text x="150" y="362" text-anchor="middle" font-family="monospace" font-size="8" fill="#90ee90">Données · Méthodes membres</text>

        </svg>
    </div>

    <div class="card-footer-ornament"></div>
</div>
</body>
</html>
